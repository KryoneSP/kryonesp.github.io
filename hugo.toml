baseURL = "https://kryonesp.github.io/"
languageCode = "es-es"
title = "KryoneSP | Writeups"

[params]
    # Descripción que sale bajo el título
    description = "Ciberseguridad, CTFs y Pentesting"
    # Formato de fecha
    dateFormat = "02 Jan 2006"

    # información de autor para la página principal
    [params.author]
      intro = "Hi, I'm **KryoneSP**, a cybersecurity enthusiast with a passion for CTFs and pentesting."
      description = "In this blog, I share my writeups, tutorials, and thoughts on ethical hacking and related technologies."
      # Ruta relativa dentro de /static o de recursos (por ejemplo "images/avatar.jpg")
      avatar = "images/KryoneSP.png"

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts"
    weight = 1
  [[menu.main]]
    name = "Etiquetas"
    url = "/tags"
    weight = 2


[module]
  [[module.imports]]
    path = "github.com/hugo-sid/hugo-blog-awesome"
